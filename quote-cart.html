<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Quote Cart - Bamburi Cement Kenya</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* =====================================================
           REDIRECT PAGE STYLES
           ===================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .redirect-container {
            text-align: center;
            padding: 2rem;
            max-width: 480px;
            margin: 0 auto;
        }

        .redirect-container .logo {
            height: 60px;
            width: auto;
            margin-bottom: var(--spacing-xl);
        }

        .redirect-container .spinner {
            font-size: 3rem;
            color: var(--brand-primary);
            animation: spin 1s linear infinite;
            margin-bottom: var(--spacing-lg);
            display: block;
        }

        .redirect-container h2 {
            font-size: var(--text-xl);
            margin-bottom: var(--spacing-sm);
            color: var(--text-primary);
        }

        .redirect-container p {
            color: var(--text-secondary);
            font-size: var(--text-base);
            margin-bottom: var(--spacing-md);
        }

        .redirect-container .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-full);
            overflow: hidden;
            margin-top: var(--spacing-md);
        }

        .redirect-container .progress-bar .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--brand-primary);
            border-radius: var(--radius-full);
            animation: progress 1.5s ease-in-out forwards;
        }

        .redirect-container .manual-link {
            display: inline-block;
            margin-top: var(--spacing-lg);
            color: var(--brand-primary);
            font-weight: 600;
            text-decoration: none;
        }

        .redirect-container .manual-link:hover {
            text-decoration: underline;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes progress {
            0% { width: 0%; }
            80% { width: 85%; }
            100% { width: 100%; }
        }

        /* Dark mode */
        @media (prefers-color-scheme: dark) {
            body {
                background: var(--bg-secondary);
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .redirect-container {
                padding: 1.5rem;
            }
            .redirect-container .logo {
                height: 45px;
            }
            .redirect-container .spinner {
                font-size: 2.5rem;
            }
            .redirect-container h2 {
                font-size: var(--text-lg);
            }
            .redirect-container p {
                font-size: var(--text-sm);
            }
        }
    </style>
</head>
<body>

    <div class="redirect-container">
        <!-- Logo -->
        <img src="images/logo.png" alt="Bamburi Cement Kenya" class="logo" />

        <!-- Spinner -->
        <span class="spinner">
            <i class="fas fa-spinner"></i>
        </span>

        <!-- Title -->
        <h2>Opening Your Quote Cart</h2>
        <p>Please wait while we redirect you to your cart...</p>

        <!-- Progress Bar -->
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <!-- Manual fallback link -->
        <a href="index.html" class="manual-link">
            <i class="fas fa-arrow-left"></i> Return to Home
        </a>
    </div>

    <!-- ============================================
    REDIRECT SCRIPT
    ============================================ -->
    <script>
        // ============================================
        // REDIRECT TO HOME WITH CART OPEN
        // ============================================

        // Redirect to index.html with openCart parameter
        // This will trigger the cart panel to open automatically
        setTimeout(function() {
            window.location.href = 'index.html?openCart=true';
        }, 1200);

        // Also allow manual click to bypass the wait
        document.querySelector('.manual-link').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = 'index.html?openCart=true';
        });

        console.log('Ã¢Å“â€¦ Redirecting to homepage with cart open...');
    </script>

    <!-- Shared floating contact and quote-cart controls -->
    <div class="floating-buttons" aria-label="Quick actions">
        <button class="float-btn cart-btn" id="cartBtn" type="button" aria-label="Open quote cart">
            <i class="fas fa-shopping-cart" aria-hidden="true"></i>
            <span class="cart-count" id="cartCount" aria-live="polite">0</span>
        </button>
        <a href="https://wa.me/254750210207" class="float-btn whatsapp-btn" target="_blank" rel="noopener" aria-label="Chat on WhatsApp"><i class="fab fa-whatsapp" aria-hidden="true"></i></a>
        <a href="tel:+254750210207" class="float-btn call-btn" aria-label="Call Bamburi Cement"><i class="fas fa-phone" aria-hidden="true"></i></a>
    </div>
    <div class="cart-overlay" id="cartOverlay" aria-hidden="true"></div>
    <aside class="cart-panel" id="cartPanel" role="dialog" aria-modal="true" aria-label="Quote cart">
        <div class="cart-header">
            <h3><i class="fas fa-shopping-cart" aria-hidden="true"></i> Quote Cart <span id="cartPanelCount">(0)</span></h3>
            <button class="cart-close" id="cartClose" type="button" aria-label="Close quote cart"><i class="fas fa-times" aria-hidden="true"></i></button>
        </div>
        <div class="cart-body" id="cartBody"></div>
        <div class="cart-footer hidden" id="cartFooter">
            <div class="cart-total"><span>Estimated Total</span><span id="cartTotal">KSh 0</span></div>
            <div class="cart-actions">
                <a href="products.html" class="btn btn-outline" onclick="closeCart()">Continue Shopping</a>
                <button class="btn btn-primary" id="cartRequestQuote" type="button"><i class="fab fa-whatsapp" aria-hidden="true"></i> Request Quotation</button>
            </div>
        </div>
    </aside>
    <script src="products.js"></script>
    <script src="script.js"></script>
</body>
</html>
